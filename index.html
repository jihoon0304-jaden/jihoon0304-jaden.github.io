.loading{text-align:center;padding:20px;color:#888;font-size:13px}
/* ===== 공지사항 효과 ===== */
@keyframes noticeGlow {
  0% { box-shadow: 0 0 5px rgba(255,215,0,0.3); }
  50% { box-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,165,0,0.4); }
  100% { box-shadow: 0 0 5px rgba(255,215,0,0.3); }
}
@keyframes noticeSlideIn {
  0% { transform: translateY(-30px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}
@keyframes noticePulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}
@keyframes noticeTextScroll {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}
@keyframes bellShake {
  0% { transform: rotate(0); }
  15% { transform: rotate(15deg); }
  30% { transform: rotate(-15deg); }
  45% { transform: rotate(10deg); }
  60% { transform: rotate(-10deg); }
  75% { transform: rotate(5deg); }
  100% { transform: rotate(0); }
}

#noticeBanner {
  animation: noticeSlideIn 0.6s ease-out, noticeGlow 2s ease-in-out infinite !important;
  border: 2px solid rgba(255,215,0,0.6) !important;
  border-radius: 12px !important;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s;
}
#noticeBanner:hover {
  transform: scale(1.02);
  box-shadow: 0 0 30px rgba(255,215,0,1), 0 0 60px rgba(255,165,0,0.6) !important;
}

/* 반짝이 배경 효과 */
#noticeBanner::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
  animation: noticeShine 3s ease-in-out infinite;
}
@keyframes noticeShine {
  0% { transform: translateX(-100%) translateY(-100%); }
  100% { transform: translateX(100%) translateY(100%); }
}

.notice-bell {
  display: inline-block;
  animation: bellShake 1s ease-in-out infinite;
  font-size: 1.3em;
}

.notice-text-wrap {
  font-weight: bold;
  font-size: 1.05em;
  letter-spacing: 0.5px;
  text-shadow: 0 0 10px rgba(255,255,255,0.3);
}

/* 긴 공지일 때 흐르는 효과 (선택) */
.notice-scroll {
  display: inline-block;
  white-space: nowrap;
  animation: noticeTextScroll 12s linear infinite;
}

.notice-new-badge {
  display: inline-block;
  background: #ff3b3b;
  color: #fff;
  font-size: 0.7em;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 8px;
  animation: noticePulse 1s ease-in-out infinite;
  vertical-align: middle;
}
/* ===== 당첨 축하 효과 ===== */
@keyframes confettiFall {
  0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
@keyframes popupZoom {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes firework {
  0% { transform: scale(0); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.8; }
  100% { transform: scale(0); opacity: 0; }
}
@keyframes shineText {
  0% { background-position: -200%; }
  100% { background-position: 200%; }
}

#winCelebrate {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: 99999;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}
#winCelebrate.show { display: flex; }

.confetti-piece {
  position: fixed;
  top: -20px;
  width: 10px;
  height: 20px;
  border-radius: 3px;
  animation: confettiFall linear forwards;
  z-index: 100000;
}

.win-popup {
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  border: 3px solid gold;
  border-radius: 20px;
  padding: 40px 30px;
  max-width: 420px;
  width: 90%;
  text-align: center;
  animation: popupZoom 0.6s ease-out;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(255,215,0,0.5), 0 0 80px rgba(255,215,0,0.2);
}
.win-popup::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(255,215,0,0.08) 50%, transparent 60%);
  animation: noticeShine 2s ease-in-out infinite;
}

.win-trophy { font-size: 60px; margin-bottom: 10px; }
.win-title {
  font-size: 28px;
  font-weight: bold;
  background: linear-gradient(90deg, #ffd700, #ffaa00, #ffd700, #fff, #ffd700);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shineText 2s linear infinite;
  margin: 10px 0;
}
.win-rank { font-size: 50px; font-weight: bold; color: #ffd700; margin: 15px 0; }
.win-detail {
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 15px;
  margin: 15px 0;
  text-align: left;
  color: #ddd;
  font-size: 14px;
  line-height: 1.8;
}
.win-detail b { color: #ffd700; }
.win-numbers {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin: 15px 0;
}
.win-ball {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ffd700, #ff8c00);
  color: #000;
  font-weight: bold;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 10px rgba(255,215,0,0.5);
}
.win-close-btn {
  margin-top: 20px;
  padding: 12px 40px;
  background: linear-gradient(135deg, #ffd700, #ff8c00);
  border: none;
  border-radius: 25px;
  color: #000;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  position: relative;
  z-index: 1;
}
.win-close-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,215,0,0.8); }

.firework-circle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 100001;
}

</style>

// ============ 볼 색상 ============
function getBallClass(n){
  if(n<=10) return 'b1';
  if(n<=20) return 'b2';
  if(n<=30) return 'b3';
  if(n<=40) return 'b4';
  return 'b5';
}
function ballHTML(n, extra){
  return '<span class="ball '+getBallClass(n)+(extra?' '+extra:'')+'">' +n+'</span>';
}

// ============ 패턴 분석 엔진 ============
function analyzeAllWinningPatterns(){
  var patternMap = {};
  for(var i=1; i<allData.length; i++){
    var current = allData[i].numbers.slice().sort(function(a,b){return a-b;});
    var m3=0, m4=0, m5=0;
    for(var j=0; j<i; j++){
      var past = allData[j].numbers.slice().sort(function(a,b){return a-b;});
      var matchCount=0;
      for(var k=0;k<current.length;k++){
        for(var l=0;l<past.length;l++){
          if(current[k]===past[l]){matchCount++;break;}
        }
      }
      if(matchCount===3) m3++;
      if(matchCount===4) m4++;
      if(matchCount>=5) m5++;
    }
    var key = groupKey(m3,m4,m5);
    if(!patternMap[key]){
      patternMap[key]={key:key, count:0, rounds:[], m3Total:0, m4Total:0, m5Total:0};
    }
    patternMap[key].count++;
    patternMap[key].rounds.push(allData[i].round);
    patternMap[key].m3Total += m3;
    patternMap[key].m4Total += m4;
    patternMap[key].m5Total += m5;
  }
  var patterns = [];
  for(var k in patternMap){ patterns.push(patternMap[k]); }
  patterns.sort(function(a,b){return b.count-a.count;});
  var total = patterns.length;
  for(var i=0;i<patterns.length;i++){
    var pct = i/total;
    if(pct<0.15) patterns[i].grade='S';
    else if(pct<0.35) patterns[i].grade='A';
    else if(pct<0.60) patterns[i].grade='B';
    else if(pct<0.85) patterns[i].grade='C';
    else patterns[i].grade='D';
  }
  patternRanking = patterns;
}

function groupKey(m3,m4,m5){
  return '5등'+groupRange(m3,[0,1,3,5,10,999])+'_4등'+groupRange(m4,[0,1,2,3,5,999])+'_3등'+groupRange(m5,[0,1,2,999]);
}
function groupRange(val, ranges){
  for(var i=0;i<ranges.length-1;i++){
    if(val>=ranges[i] && val<ranges[i+1]){
      if(ranges[i+1]===999) return ranges[i]+'+';
      return ranges[i]+'-'+(ranges[i+1]-1);
    }
  }
  return val+'';
}

// ============ AI 최적 패턴 ============
function decideAITarget(){
  if(allData.length<11){aiTargetGrade='S';aiReason='데이터 분석중...';return;}
  var recent10 = allData.slice(-10);
  var gradeCount = {S:0, A:0, B:0, C:0};
  for(var r=0;r<recent10.length;r++){
    var draw = recent10[r];
    var nums = draw.numbers.slice().sort(function(a,b){return a-b;});
    var m3=0, m4=0, m5=0;
    for(var j=0;j<allData.length;j++){
      if(allData[j].round >= draw.round) break;
      var past = allData[j].numbers.slice().sort(function(a,b){return a-b;});
      var mc=0;
      for(var k=0;k<nums.length;k++){
        for(var l=0;l<past.length;l++){
          if(nums[k]===past[l]){mc++;break;}
        }
      }
      if(mc===3) m3++;
      if(mc===4) m4++;
      if(mc>=5) m5++;
    }
    var key = groupKey(m3,m4,m5);
    for(var p=0;p<patternRanking.length;p++){
      if(patternRanking[p].key===key){
        var g = patternRanking[p].grade;
        if(gradeCount.hasOwnProperty(g)) gradeCount[g]++;
        break;
      }
    }
  }
  var minGrade='S', minCount=999;
  var grades=['S','A','B','C'];
  for(var i=0;i<grades.length;i++){
    if(gradeCount[grades[i]]<minCount){
      minCount=gradeCount[grades[i]];
      minGrade=grades[i];
    }
  }
  aiTargetGrade = minGrade;
  aiReason = '최근 10회 1등 분석: S('+gradeCount.S+'회) A('+gradeCount.A+'회) B('+gradeCount.B+'회) C('+gradeCount.C+'회) → '+minGrade+'등급이 '+minCount+'회로 가장 적음 → 이번 주 '+minGrade+'등급 추천';
}

// ============ 최근 3회 당첨번호 ============
function showLastDraws(){
  var el = document.getElementById('lastDraws');
  if(allData.length===0){el.innerHTML='<div class="loading">데이터 없음</div>';return;}
  var last3 = allData.slice(-3).reverse();
  var html='';
  for(var r=0;r<last3.length;r++){
    var draw=last3[r];
    var nums=draw.numbers.slice().sort(function(a,b){return a-b;});
    var m3=0,m4=0,m5=0;
    var idx=-1;
    for(var i=0;i<allData.length;i++){if(allData[i].round===draw.round){idx=i;break;}}
    for(var j=0;j<idx;j++){
      var past=allData[j].numbers.slice().sort(function(a,b){return a-b;});
      var mc=0;
      for(var k=0;k<nums.length;k++){for(var l=0;l<past.length;l++){if(nums[k]===past[l]){mc++;break;}}}
      if(mc===3)m3++;if(mc===4)m4++;if(mc>=5)m5++;
    }
    var key=groupKey(m3,m4,m5);
    var grade='-';
    for(var p=0;p<patternRanking.length;p++){if(patternRanking[p].key===key){grade=patternRanking[p].grade;break;}}
    var ballsStr='';
    for(var b=0;b<nums.length;b++){ballsStr+=ballHTML(nums[b]);}
    if(draw.bonus) ballsStr+=' <span style="color:#888;margin:0 4px">+</span>'+ballHTML(draw.bonus,'bonus');
    html+='<div class="draw-row"><div class="draw-round">'+draw.round+'회 <span class="draw-grade grade-'+grade+'">'+grade+'등급</span> <span style="font-size:10px;color:#888;margin-left:4px">5등'+m3+'회 4등'+m4+'회 3등'+m5+'회</span></div><div class="draw-balls">'+ballsStr+'</div></div>';
  }
  el.innerHTML=html;
}

function showScoreboard(){

// ============ 번호 생성 ============
function selectGrade(grade){
  var targetGrade = (grade==='AI') ? aiTargetGrade : grade;
  generateByGrade(targetGrade, grade==='AI');
}

function generateByGrade(targetGrade, isAI){
  var targetPatterns=[];
  for(var i=0;i<patternRanking.length;i++){
    if(patternRanking[i].grade===targetGrade) targetPatterns.push(patternRanking[i]);
  }
  if(targetPatterns.length===0){showToast('해당 등급 패턴이 없습니다');return;}
  var freq=getFrequency();
  var best=null,bestScore=-1,bestInfo=null;
  var attempts=0,maxAttempts=10000;
  while(attempts<maxAttempts){
    attempts++;
    var nums=generateCandidate(freq);
    if(isAlreadyWon(nums)) continue;
    var numsSorted=nums.slice().sort(function(a,b){return a-b;});
    var m3=0,m4=0,m5=0;
    var proofs=[];
    for(var j=0;j<allData.length;j++){
      var past=allData[j].numbers.slice().sort(function(a,b){return a-b;});
      var matched=[];
      for(var k=0;k<numsSorted.length;k++){
        for(var l=0;l<past.length;l++){
          if(numsSorted[k]===past[l]){matched.push(numsSorted[k]);break;}
        }
      }
      if(matched.length===3){m3++;proofs.push({round:allData[j].round,prize:'5등',matched:matched.slice(),all:past});}
      if(matched.length===4){m4++;proofs.push({round:allData[j].round,prize:'4등',matched:matched.slice(),all:past});}
      if(matched.length>=5){m5++;proofs.push({round:allData[j].round,prize:'3등',matched:matched.slice(),all:past});}
    }
    var key=groupKey(m3,m4,m5);
    var foundPattern=null;
    for(var p=0;p<patternRanking.length;p++){
      if(patternRanking[p].key===key){foundPattern=patternRanking[p];break;}
    }
    if(foundPattern && foundPattern.grade===targetGrade){
      var score=foundPattern.count;
      if(score>bestScore){bestScore=score;best=nums;bestInfo={m3:m3,m4:m4,m5:m5,key:key,grade:foundPattern.grade,patternCount:foundPattern.count,proofs:proofs,found:foundPattern};}
      if(attempts>500 && best) break;
    }
  }
  if(!best){showToast('번호 생성 실패 - 다시 시도해주세요');return;}
  showResult(best,bestInfo,isAI);
}

function generateCandidate(freq){
  var nums={};var count=0;
  var sorted=freq.slice().sort(function(a,b){return b.count-a.count;});
  var hot=[],warm=[],cold=[];
  for(var i=0;i<sorted.length;i++){
    if(i<15)hot.push(sorted[i].num);
    else if(i<30)warm.push(sorted[i].num);
    else cold.push(sorted[i].num);
  }
  var result=[];
  while(result.length<6){
    var r=Math.random();
    var pool;
    if(r<0.5)pool=hot;else if(r<0.8)pool=warm;else pool=cold;
    var n=pool[Math.floor(Math.random()*pool.length)];
    var dup=false;
    for(var i=0;i<result.length;i++){if(result[i]===n){dup=true;break;}}
    if(!dup) result.push(n);
  }
  return result.sort(function(a,b){return a-b;});
}

function getFrequency(){
  var recent=allData.slice(-100);
  var freq=[];
  for(var i=1;i<=45;i++){
    var c=0;
    for(var j=0;j<recent.length;j++){
      var nums=recent[j].numbers;
      for(var k=0;k<nums.length;k++){if(nums[k]===i){c++;break;}}
    }
    freq.push({num:i,count:c});
  }
  return freq;
}

function isAlreadyWon(nums){
  var s=nums.slice().sort(function(a,b){return a-b;}).join(',');
  for(var i=0;i<allData.length;i++){
    if(allData[i].numbers.slice().sort(function(a,b){return a-b;}).join(',')===s) return true;
  }
  return false;
}

          rank: data.matchResult.rank,
          matched: data.matchResult.matched || []
        });
      }
    });
    if(wins.length > 0){
      // 가장 높은 등수부터 보여주기
      wins.sort(function(a,b){ return a.rank - b.rank; });
      showWinCelebrate(wins[0]);
      // 축하 표시 기록
      wins.forEach(function(w){
        window.fb.setDoc(
          window.fb.doc(window.fb.db,'users',uid,'numbers',w.id),
          { celebrated: true },
          { merge: true }
        );
      });
    }
  }).catch(function(e){ console.log('당첨 체크 오류:', e); });
}

function showWinCelebrate(win){
  var rankNames = {1:'1등 🥇',2:'2등 🥈',3:'3등 🥉',4:'4등',5:'5등'};
  var rankPrize = {1:'약 20억원+',2:'약 5,000만원+',3:'약 150만원+',4:'5만원',5:'5,000원'};

  document.getElementById('winRankDisplay').textContent = rankNames[win.rank] || win.rank+'등';

  var savedDate = win.savedAt ? new Date(win.savedAt).toLocaleDateString('ko-KR') : '날짜 미상';
  document.getElementById('winDetailDisplay').innerHTML =
    '<b>저장일:</b> ' + savedDate + '<br>' +
    '<b>등급:</b> ' + win.grade + '<br>' +
    '<b>당첨 회차:</b> 제 ' + win.matchRound + '회<br>' +
    '<b>예상 당첨금:</b> ' + (rankPrize[win.rank]||'') + '<br>' +
    '<b>일치 번호:</b> ' + (win.matched.length > 0 ? win.matched.join(', ') : '-');

  var numEl = document.getElementById('winNumbersDisplay');
  numEl.innerHTML = '';
  if(win.numbers && win.numbers.length){
    win.numbers.forEach(function(n){
      var isMatch = win.matched && win.matched.indexOf(n) !== -1;
      var ball = document.createElement('div');
      ball.className = 'win-ball';
      ball.textContent = n;
      if(!isMatch){
        ball.style.background = 'linear-gradient(135deg,#555,#333)';
        ball.style.color = '#999';
        ball.style.boxShadow = 'none';
      }
      numEl.appendChild(ball);
    });
  }

  var el = document.getElementById('winCelebrate');
  el.classList.add('show');
  launchConfetti();
  launchFireworks();
}

function closeWinCelebrate(){
  document.getElementById('winCelebrate').classList.remove('show');
  // 남은 꽃가루 제거
  document.querySelectorAll('.confetti-piece').forEach(function(c){ c.remove(); });
  document.querySelectorAll('.firework-circle').forEach(function(f){ f.remove(); });
}

function launchConfetti(){
  var colors = ['#ffd700','#ff3b3b','#00c853','#2979ff','#ff6d00','#aa00ff','#ff4081','#00e5ff'];
  for(var i = 0; i < 80; i++){
    (function(idx){
      setTimeout(function(){
        var piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = (Math.random() * 8 + 6) + 'px';
        piece.style.height = (Math.random() * 12 + 10) + 'px';
        piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
        piece.style.animationDelay = '0s';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
        document.body.appendChild(piece);
        setTimeout(function(){ piece.remove(); }, 4500);
      }, idx * 50);
    })(i);
  }
}

function launchFireworks(){
  var fwColors = ['rgba(255,215,0,0.6)','rgba(255,59,59,0.5)','rgba(0,200,83,0.5)','rgba(41,121,255,0.5)'];
  for(var i = 0; i < 6; i++){
    (function(idx){
      setTimeout(function(){
        var fw = document.createElement('div');
        fw.className = 'firework-circle';
        fw.style.left = (Math.random() * 80 + 10) + '%';
        fw.style.top = (Math.random() * 60 + 10) + '%';
        fw.style.width = (Math.random() * 100 + 80) + 'px';
        fw.style.height = fw.style.width;
        fw.style.border = '3px solid ' + fwColors[Math.floor(Math.random() * fwColors.length)];
        fw.style.animation = 'firework 1s ease-out forwards';
        document.body.appendChild(fw);
        setTimeout(function(){ fw.remove(); }, 1200);
      }, idx * 500);
    })(i);
  }
}

function updateCountdown(){
  var now = new Date();
  var nextDraw = new Date(now);
  nextDraw.setHours(20,45,0,0);
  var day = nextDraw.getDay();
  var diff = (6 - day + 7) % 7;
  if(diff === 0 && now >= nextDraw) diff = 7;
  nextDraw.setDate(nextDraw.getDate() + diff);
  var lastRound = allData.length > 0 ? allData[allData.length-1].round : 0;
  var nextRound = lastRound + 1;
  document.getElementById('countdownRound').textContent = '제 ' + nextRound + '회 추첨까지';
  var gap = nextDraw - now;
  if(gap <= 0){
    document.getElementById('countdownTimer').textContent = '🎉 추첨 진행중!';
    return;
  }
  var d = Math.floor(gap / 86400000);
  var h = Math.floor((gap % 86400000) / 3600000);
  var m = Math.floor((gap % 3600000) / 60000);
  var s = Math.floor((gap % 60000) / 1000);
  var text = '';
  if(d > 0) text += d + '일 ';
  text += String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  document.getElementById('countdownTimer').textContent = text;
}
setInterval(updateCountdown, 1000);
