<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>당첨 후기 게시판 - AI 로또 분석기</title>
<meta name="description" content="AI 로또 분석기 사용자들의 당첨 후기와 번호 공유 게시판">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Malgun Gothic',sans-serif;background:#0a0a1a;color:#eee;min-height:100vh;padding-bottom:80px}
.container{max-width:500px;margin:0 auto;padding:12px}
.header{text-align:center;padding:20px 0 10px}
.header h1{font-size:22px;color:#fff}
.header h1 span{background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:#888;font-size:12px;margin-top:4px}
.nav-bar{display:flex;gap:8px;margin-bottom:12px}
.nav-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:block}
.nav-home{background:#1a1a2e;color:#a78bfa}
.nav-write{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.card{background:#12122a;border:1px solid #1e1e3a;border-radius:16px;padding:16px;margin-bottom:12px}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* 글쓰기 폼 */
.write-form{display:none}
.write-form.show{display:block}
.form-input{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#0a0a1a;color:#eee;font-size:13px;margin-bottom:8px;font-family:inherit}
.form-input:focus{border-color:#667eea;outline:none}
textarea.form-input{height:120px;resize:vertical}
.rank-select{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.rank-btn{padding:6px 12px;border-radius:8px;border:1px solid #333;background:#0a0a1a;color:#888;font-size:12px;cursor:pointer;transition:all 0.2s}
.rank-btn.selected{border-color:#fbbf24;color:#fbbf24;background:#1a1a0a}
.form-submit{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.form-submit:disabled{opacity:0.5;cursor:not-allowed}

/* 게시글 */
.post-item{background:#1a1a2e;border-radius:12px;padding:14px;margin-bottom:10px;position:relative}
.post-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.post-nick{font-size:13px;font-weight:700;color:#a78bfa}
.post-date{font-size:10px;color:#555}
.post-rank-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;margin-bottom:8px}
.rank-1{background:#fbbf24;color:#000}
.rank-2{background:#c0c0c0;color:#000}
.rank-3{background:#cd7f32;color:#fff}
.rank-4{background:#60a5fa;color:#fff}
.rank-5{background:#34d399;color:#000}
.rank-none{background:#333;color:#888}
.post-content{font-size:13px;line-height:1.7;color:#ddd;white-space:pre-wrap;word-break:break-all}
.post-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid #0a0a1a}
.like-btn{background:none;border:1px solid #333;border-radius:8px;padding:4px 12px;color:#888;font-size:12px;cursor:pointer;transition:all 0.2s}
.like-btn:hover{border-color:#ef4444;color:#ef4444}
.like-btn.liked{border-color:#ef4444;color:#ef4444;background:#1a0a0a}
.post-num{font-size:10px;color:#555}

/* 배너 */
.board-banner{margin-bottom:12px;border-radius:12px;overflow:hidden}

/* 페이지네이션 */
.pagination{display:flex;justify-content:center;gap:6px;margin-top:12px}
.page-btn{padding:6px 12px;border-radius:8px;border:1px solid #333;background:#0a0a1a;color:#888;font-size:12px;cursor:pointer}
.page-btn.active{border-color:#667eea;color:#667eea;background:#1a1a3e}

/* 빈 상태 */
.empty-state{text-align:center;padding:40px 20px;color:#555}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.empty-state .text{font-size:13px;line-height:1.6}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;display:none;z-index:9999}
.toast.show{display:block;animation:fadeInOut 2s ease}
@keyframes fadeInOut{0%{opacity:0}15%{opacity:1}85%{opacity:1}100%{opacity:0}}
.footer{text-align:center;color:#555;font-size:11px;padding:20px 0;line-height:1.6}
.loading{text-align:center;padding:20px;color:#888;font-size:13px}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📝 <span>당첨 후기</span> 게시판</h1>
    <div class="sub">AI 로또 분석기 사용자들의 생생한 후기</div>
  </div>

  <div class="nav-bar">
    <a href="index.html" class="nav-btn nav-home">🎱 번호 생성으로</a>
    <button class="nav-btn nav-write" onclick="toggleWriteForm()">✏️ 후기 작성</button>
  </div>

  <div id="boardBannerTop" class="board-banner" style="display:none"></div>

  <div id="writeForm" class="card write-form">
    <div class="card-title">✏️ 당첨 후기 작성</div>
    <input type="text" id="postNick" class="form-input" placeholder="닉네임 (익명 가능)" maxlength="20">
    <div style="font-size:11px;color:#888;margin-bottom:6px">당첨 등수 선택 (선택사항)</div>
    <div class="rank-select" id="rankSelect">
      <div class="rank-btn" onclick="selectRank(1)">🥇 1등</div>
      <div class="rank-btn" onclick="selectRank(2)">🥈 2등</div>
      <div class="rank-btn" onclick="selectRank(3)">🥉 3등</div>
      <div class="rank-btn" onclick="selectRank(4)">4등</div>
      <div class="rank-btn" onclick="selectRank(5)">5등</div>
      <div class="rank-btn" onclick="selectRank(0)">해당없음</div>
    </div>
    <textarea id="postContent" class="form-input" placeholder="당첨 후기, 번호 공유, 자유로운 이야기를 남겨주세요!" maxlength="1000"></textarea>
    <div style="text-align:right;font-size:10px;color:#555;margin-bottom:8px"><span id="charCount">0</span>/1000</div>
    <button class="form-submit" id="submitBtn" onclick="submitPost()">📤 게시하기</button>
  </div>

  <div class="card">
    <div class="card-title" style="justify-content:space-between">
      <span>📋 전체 후기 <span id="totalCount" style="color:#667eea">0</span>건</span>
      <select id="sortSelect" onchange="loadPosts()" style="background:#0a0a1a;color:#888;border:1px solid #333;border-radius:6px;padding:4px 8px;font-size:11px">
        <option value="latest">최신순</option>
        <option value="likes">좋아요순</option>
      </select>
    </div>
    <div id="postList"><div class="loading">로딩중...</div></div>
    <div id="pagination" class="pagination"></div>
  </div>

  <div id="boardBannerBottom" class="board-banner" style="display:none"></div>

  <div class="footer">AI 로또 분석기 v5.0<br>과거 데이터 패턴 기반 분석 · 당첨을 보장하지 않습니다</div>
</div>

<div id="toast" class="toast"></div>

<script>
var firebaseLoaded = false;
var posts = [];
var currentPage = 1;
var postsPerPage = 10;
var selectedRank = -1;
var myLikes = {};

// 좋아요 로컬 저장
try{ myLikes = JSON.parse(localStorage.getItem('boardLikes')||'{}'); }catch(e){}

// Firebase 로드
async function loadFirebase(){
  try{
    var appMod = await import("https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js");
    var fsMod = await import("https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js");
    var firebaseConfig = {
      apiKey:"AIzaSyBdLvfI1ItgRLtGs1qFLBMjZIn3tPaI3Nw",
      authDomain:"lottl-jihoon.firebaseapp.com",
      projectId:"lottl-jihoon",
      storageBucket:"lottl-jihoon.firebasestorage.app",
      messagingSenderId:"814020270032",
      appId:"1:814020270032:web:e4895c727d7d1e00ed0bd5"
    };
    var app = appMod.initializeApp(firebaseConfig);
    var db = fsMod.getFirestore(app);
    window.fb = {
      db:db,
      collection:fsMod.collection, doc:fsMod.doc,
      setDoc:fsMod.setDoc, getDocs:fsMod.getDocs,
      deleteDoc:fsMod.deleteDoc, getDoc:fsMod.getDoc
    };
    firebaseLoaded = true;
    console.log('Firebase 로드 성공');
    loadPosts();
    loadBoardBanners();
  }catch(e){
    console.log('Firebase 로드 실패:', e.message);
    document.getElementById('postList').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="text">서버 연결 실패<br>잠시 후 다시 시도해주세요</div></div>';
  }
}

// 글쓰기 폼 토글
function toggleWriteForm(){
  var form = document.getElementById('writeForm');
  form.classList.toggle('show');
  if(form.classList.contains('show')){
    document.getElementById('postNick').focus();
  }
}

// 등수 선택
function selectRank(rank){
  selectedRank = rank;
  var btns = document.querySelectorAll('.rank-btn');
  for(var i=0; i<btns.length; i++) btns[i].classList.remove('selected');
  if(rank === 1) btns[0].classList.add('selected');
  else if(rank === 2) btns[1].classList.add('selected');
  else if(rank === 3) btns[2].classList.add('selected');
  else if(rank === 4) btns[3].classList.add('selected');
  else if(rank === 5) btns[4].classList.add('selected');
  else if(rank === 0) btns[5].classList.add('selected');
}

// 글자수 카운트
document.addEventListener('DOMContentLoaded', function(){
  var ta = document.getElementById('postContent');
  if(ta){
    ta.addEventListener('input', function(){
      document.getElementById('charCount').textContent = this.value.length;
    });
  }
});

// 게시글 작성
async function submitPost(){
  if(!firebaseLoaded){ showToast('서버 연결중입니다. 잠시 후 다시 시도해주세요.'); return; }
  var nick = document.getElementById('postNick').value.trim() || '익명';
  var content = document.getElementById('postContent').value.trim();
  if(!content){ showToast('내용을 입력해주세요!'); return; }
  if(content.length < 5){ showToast('5자 이상 입력해주세요!'); return; }

  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '게시중...';

  try{
    var id = 'post_' + Date.now();
    var now = new Date();
    var post = {
      id: id,
      nickname: nick,
      content: content,
      rank: selectedRank >= 0 ? selectedRank : -1,
      likes: 0,
      createdAt: now.toISOString(),
      timestamp: Date.now()
    };
    await window.fb.setDoc(window.fb.doc(window.fb.db, 'board', id), post);
    showToast('게시 완료!');
    document.getElementById('postNick').value = '';
    document.getElementById('postContent').value = '';
    document.getElementById('charCount').textContent = '0';
    selectedRank = -1;
    var btns = document.querySelectorAll('.rank-btn');
    for(var i=0; i<btns.length; i++) btns[i].classList.remove('selected');
    document.getElementById('writeForm').classList.remove('show');
    currentPage = 1;
    loadPosts();
  }catch(e){
    showToast('게시 실패: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '📤 게시하기';
}

// 게시글 로드
async function loadPosts(){
  if(!firebaseLoaded) return;
  try{
    var snap = await window.fb.getDocs(window.fb.collection(window.fb.db, 'board'));
    posts = [];
    snap.forEach(function(docSnap){
      posts.push(docSnap.data());
    });

    var sort = document.getElementById('sortSelect').value;
    if(sort === 'likes'){
      posts.sort(function(a,b){ return (b.likes||0) - (a.likes||0); });
    } else {
      posts.sort(function(a,b){ return (b.timestamp||0) - (a.timestamp||0); });
    }

    document.getElementById('totalCount').textContent = posts.length;
    renderPosts();
  }catch(e){
    console.log('게시글 로드 실패:', e.message);
  }
}

// 게시글 렌더링
function renderPosts(){
  var el = document.getElementById('postList');
  if(posts.length === 0){
    el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="text">아직 후기가 없어요!<br>첫 번째 후기를 남겨보세요 ✨</div></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  var totalPages = Math.ceil(posts.length / postsPerPage);
  var start = (currentPage - 1) * postsPerPage;
  var end = Math.min(start + postsPerPage, posts.length);
  var pagePosts = posts.slice(start, end);

  var html = '';
  for(var i=0; i<pagePosts.length; i++){
    var p = pagePosts[i];
    var date = new Date(p.createdAt);
    var dateStr = date.getFullYear() + '.' + String(date.getMonth()+1).padStart(2,'0') + '.' + String(date.getDate()).padStart(2,'0') + ' ' + String(date.getHours()).padStart(2,'0') + ':' + String(date.getMinutes()).padStart(2,'0');

    var rankTag = '';
    if(p.rank === 1) rankTag = '<div class="post-rank-tag rank-1">🥇 1등 당첨</div>';
    else if(p.rank === 2) rankTag = '<div class="post-rank-tag rank-2">🥈 2등 당첨</div>';
    else if(p.rank === 3) rankTag = '<div class="post-rank-tag rank-3">🥉 3등 당첨</div>';
    else if(p.rank === 4) rankTag = '<div class="post-rank-tag rank-4">4등 당첨</div>';
    else if(p.rank === 5) rankTag = '<div class="post-rank-tag rank-5">5등 당첨</div>';

    var isLiked = myLikes[p.id] ? true : false;
    var likeClass = isLiked ? ' liked' : '';

    html += '<div class="post-item">';
    html += '<div class="post-header"><span class="post-nick">' + escapeHTML(p.nickname) + '</span><span class="post-date">' + dateStr + '</span></div>';
    html += rankTag;
    html += '<div class="post-content">' + escapeHTML(p.content) + '</div>';
    html += '<div class="post-footer"><button class="like-btn' + likeClass + '" onclick="toggleLike(\'' + p.id + '\')">❤️ <span id="like_' + p.id + '">' + (p.likes||0) + '</span></button><span class="post-num">#' + (start + i + 1) + '</span></div>';
    html += '</div>';
  }
  el.innerHTML = html;

  // 페이지네이션
  var pagHtml = '';
  if(totalPages > 1){
    if(currentPage > 1) pagHtml += '<button class="page-btn" onclick="goPage(' + (currentPage-1) + ')">◀</button>';
    for(var p=1; p<=totalPages; p++){
      pagHtml += '<button class="page-btn' + (p===currentPage?' active':'') + '" onclick="goPage(' + p + ')">' + p + '</button>';
    }
    if(currentPage < totalPages) pagHtml += '<button class="page-btn" onclick="goPage(' + (currentPage+1) + ')">▶</button>';
  }
  document.getElementById('pagination').innerHTML = pagHtml;
}

function goPage(p){
  currentPage = p;
  renderPosts();
  window.scrollTo({top:0, behavior:'smooth'});
}

// 좋아요 토글
async function toggleLike(postId){
  if(!firebaseLoaded) return;

  var isLiked = myLikes[postId] ? true : false;
  var post = null;
  for(var i=0; i<posts.length; i++){
    if(posts[i].id === postId){ post = posts[i]; break; }
  }
  if(!post) return;

  if(isLiked){
    post.likes = Math.max((post.likes||0) - 1, 0);
    delete myLikes[postId];
  } else {
    post.likes = (post.likes||0) + 1;
    myLikes[postId] = true;
  }

  localStorage.setItem('boardLikes', JSON.stringify(myLikes));
  document.getElementById('like_' + postId).textContent = post.likes;

  // 버튼 스타일 변경
  var btns = document.querySelectorAll('.like-btn');
  for(var i=0; i<btns.length; i++){
    if(btns[i].getAttribute('onclick').indexOf(postId) > -1){
      if(myLikes[postId]) btns[i].classList.add('liked');
      else btns[i].classList.remove('liked');
    }
  }

  try{
    await window.fb.setDoc(window.fb.doc(window.fb.db, 'board', postId), {likes: post.likes}, {merge:true});
  }catch(e){ console.log('좋아요 저장 실패:', e.message); }
}

// 게시판 배너 로드
async function loadBoardBanners(){
  if(!firebaseLoaded) return;
  try{
    var bannerSnap = await window.fb.getDoc(window.fb.doc(window.fb.db, 'settings', 'banner'));
    if(bannerSnap.exists()){
      var b = bannerSnap.data();
      if(b.active && b.image){
        var bannerHTML = '<img src="' + b.image + '" style="width:100%;display:block;border-radius:12px" alt="배너">';
        if(b.link) bannerHTML = '<a href="' + b.link + '" target="_blank">' + bannerHTML + '</a>';
        var topEl = document.getElementById('boardBannerTop');
        var bottomEl = document.getElementById('boardBannerBottom');
        if(b.position === 'bottom' && bottomEl){
          bottomEl.innerHTML = bannerHTML;
          bottomEl.style.display = 'block';
        } else if(topEl){
          topEl.innerHTML = bannerHTML;
          topEl.style.display = 'block';
        }
      }
    }
  }catch(e){ console.log('배너 로드 실패:', e.message); }
}

// HTML 이스케이프 (XSS 방지)
function escapeHTML(str){
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2000);
}

// 시작
loadFirebase();
</script>
</body>
</html>
